<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GeoSpy</title>
    <style>
        body {
            background-color: black;
        }
        .geospy-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <!-- Load Ruffle in full screen mode -->
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "autoplay": "on",
            "fullscreen": "on",
            "splashScreen": false
        };
    </script>
    <!-- Load the Ruffle library -->
    <script src="ruffle/ruffle.js"></script>
</head>
<body>
    <div id="geospy-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("geospy-container");
            container.appendChild(player);
            
            // Point this directly to your acquired GeoSpy file
            player.load("geospy.swf"); 
            
            // Optional configurations for sizing
            player.style.width = "800px";
            player.style.height = "600px";
        });
    </script>
</body>
</html>
