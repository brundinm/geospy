<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GeoSpy</title>
  <style>
    /* Force the body and HTML to take up 100% of the viewport */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      overflow: hidden; /* Prevents scrollbars */
    }
    #geospy-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* Force the dynamically created Ruffle element to fill the container */
    #geospy-container rfl-player, 
    #geospy-container ruffle-player {
      width: 100%;
      height: 100%;
    }
  </style>    
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      "autoplay": "on",
      "splashScreen": false,
      "letterbox": "on" /* Keeps the game's original aspect ratio without stretching it out of shape */
    };
  </script>
  <script src="ruffle/ruffle.js"></script>
</head>

<body>
  <div id="geospy-container"></div>
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.addEventListener("load", (event) => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById("geospy-container");
      container.appendChild(player);
      player.load("geospy.swf");
      /* Removed the hardcoded 800x600px constraints so it scales dynamically */
    });
  </script>
</body>
</html>
